services:
  # Next.js App
  app:
    image: ghcr.io/no-country-simulation/horsetrust2/horsetrust:latest
    build:
      context: horsetrust/
    container_name: horsetrust-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: ${POSTGRES_PORT}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - horsetrust-network

  # PostgreSQL
  postgres:
    image: postgres:17-alpine
    container_name: horsetrust-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - horsetrust-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: horsetrust-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./horsetrust/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - horsetrust-network

volumes:
  postgres_data:

networks:
  horsetrust-network:
    driver: bridge
